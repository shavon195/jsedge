<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | JSEdge</title>

    <!-- Tailwind CSS via CDN — no build step needed -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                         Roboto, Oxygen, sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-2 text-2xl font-bold">
                <span>📈</span>
                <span class="bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                    JSEdge
                </span>
            </a>
            <span class="text-xs text-slate-400 hidden sm:inline">
                Jamaica Stock Exchange Intelligence
            </span>
        </div>
    </header>

    <!-- Tabs -->
    <nav class="bg-slate-800 border-b border-slate-700">
        <div class="max-w-6xl mx-auto px-6 flex gap-1">
            <a href="/"
               class="px-5 py-3 text-sm font-medium border-b-2 transition
                      {% if active_tab == 'jse' %}
                      border-emerald-400 text-emerald-400
                      {% else %}
                      border-transparent text-slate-400 hover:text-slate-200
                      {% endif %}">
                JSE
            </a>
            <a href="/news"
               class="px-5 py-3 text-sm font-medium border-b-2 transition
                      {% if active_tab == 'news' %}
                      border-emerald-400 text-emerald-400
                      {% else %}
                      border-transparent text-slate-400 hover:text-slate-200
                      {% endif %}">
                News
            </a>
            <a href="/trading"
               class="px-5 py-3 text-sm font-medium border-b-2 transition
                      {% if active_tab == 'trading' %}
                      border-emerald-400 text-emerald-400
                      {% else %}
                      border-transparent text-slate-400 hover:text-slate-200
                      {% endif %}">
                Trading
            </a>
        </div>
    </nav>

    <!-- Main content -->
    <main class="max-w-6xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 mt-20">
        <div class="max-w-6xl mx-auto px-6 py-6 text-center text-xs text-slate-500">
            JSEdge — built by Shavon Lloyd ·
            <a href="https://github.com/shavon195/jsedge"
               class="hover:text-slate-300 underline" target="_blank">GitHub</a>
        </div>
    </footer>

</body>
</html>
